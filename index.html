<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lex Growth — Links</title>
  <link href="https://fonts.cdnfonts.com/css/hagrid-trial" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/aileron" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --black:#080808;
      --yellow:#f5e17a;
      --yellow-dim:rgba(245,225,122,0.08);
      --yellow-border:rgba(245,225,122,0.18);
      --cream:#f0ebe0;
      --muted:rgba(240,235,224,0.38);
      --muted2:rgba(240,235,224,0.55);
      --hagrid:'Hagrid Trial',sans-serif;
      --aileron:'Aileron',sans-serif;
    }
    html,body{min-height:100%;}
    body{
      font-family:var(--aileron);
      background:var(--black);
      color:var(--cream);
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:3.5rem 1.25rem 4rem;
      position:relative;
      overflow-x:hidden;
    }

    body::before{
      content:'';position:fixed;inset:0;
      background-image:
        linear-gradient(var(--yellow-border) 1px,transparent 1px),
        linear-gradient(90deg,var(--yellow-border) 1px,transparent 1px);
      background-size:56px 56px;
      opacity:0;
      animation:gridIn 1.4s ease .2s forwards;
      mask-image:radial-gradient(ellipse 80% 60% at 50% 0%,black 0%,transparent 100%);
      pointer-events:none;z-index:0;
    }
    @keyframes gridIn{to{opacity:1;}}

    .glow{
      position:fixed;width:340px;height:340px;
      background:radial-gradient(circle,rgba(245,225,122,0.07) 0%,transparent 70%);
      border-radius:50%;pointer-events:none;z-index:0;
      transform:translate(-50%,-50%);
    }

    .wrap{
      position:relative;z-index:1;
      width:100%;max-width:400px;
      display:flex;flex-direction:column;align-items:center;
    }

    .logo-wrap{
      margin-bottom:1.75rem;
      opacity:0;animation:fadeUp .6s ease .05s forwards;
    }
    .logo{display:flex;align-items:center;}
    .logo-lex{
      font-family:var(--hagrid);font-size:1.9rem;font-weight:400;
      letter-spacing:0.02em;color:var(--cream);
    }
    .logo-growth{
      font-family:var(--hagrid);font-size:1.9rem;font-weight:800;
      color:var(--black);background:var(--yellow);
      padding:1px 13px 5px;border-radius:7px;margin-left:6px;
      transition:transform .25s;
    }
    .logo-wrap:hover .logo-growth{transform:scale(1.06);}

    .tagline{
      font-family:var(--aileron);
      font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--muted);margin-bottom:.45rem;
      opacity:0;animation:fadeUp .6s ease .15s forwards;
      display:flex;align-items:center;gap:.5rem;
    }
    .handle{
      font-family:var(--aileron);
      font-size:.95rem;font-weight:600;color:var(--cream);
      margin-bottom:2rem;
      opacity:0;animation:fadeUp .6s ease .2s forwards;
    }

    .socials{
      display:flex;gap:.85rem;margin-bottom:2.5rem;
      opacity:0;animation:fadeUp .6s ease .28s forwards;
    }
    .soc-icon{
      width:40px;height:40px;border-radius:50%;
      border:0.5px solid var(--yellow-border);
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;transition:border-color .2s,background .2s,transform .2s;
      text-decoration:none;
    }
    .soc-icon:hover{border-color:var(--yellow);background:var(--yellow-dim);transform:scale(1.12);}
    .soc-icon svg{width:17px;height:17px;fill:none;stroke:var(--cream);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

    .links{width:100%;display:flex;flex-direction:column;gap:.7rem;}

    .link-btn{
      width:100%;
      display:flex;align-items:center;
      border:0.5px solid var(--yellow-border);
      border-radius:12px;
      background:rgba(245,225,122,0.04);
      padding:0 1.2rem;
      height:60px;
      cursor:pointer;
      text-decoration:none;
      transition:background .25s,border-color .3s,transform .2s,box-shadow .2s;
      position:relative;overflow:hidden;
      opacity:0;transform:translateY(16px);
    }
    .link-btn::after{
      content:'';position:absolute;inset:0;
      background:linear-gradient(90deg,transparent,rgba(245,225,122,0.07),transparent);
      transform:translateX(-100%);transition:transform .55s ease;
    }
    .link-btn:hover::after{transform:translateX(100%);}
    .link-btn:hover{
      border-color:rgba(245,225,122,0.4);
      background:rgba(245,225,122,0.09);
      transform:translateY(-2px);
      box-shadow:0 6px 28px rgba(245,225,122,0.09);
    }
    .link-btn:active{transform:scale(0.98);}
    .link-btn.visible{
      opacity:1;transform:translateY(0);
      transition:opacity .5s ease,transform .5s ease,background .25s,border-color .3s,box-shadow .2s;
    }
    .link-btn.featured{
      border-color:rgba(245,225,122,0.3);
      background:rgba(245,225,122,0.07);
    }

    .link-icon{
      width:34px;height:34px;border-radius:8px;
      background:var(--yellow-dim);border:0.5px solid var(--yellow-border);
      display:flex;align-items:center;justify-content:center;
      flex-shrink:0;margin-right:1rem;transition:background .2s;
    }
    .link-btn:hover .link-icon{background:rgba(245,225,122,0.16);}
    .link-icon svg{width:15px;height:15px;fill:none;stroke:var(--yellow);stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}

    .link-label{
      flex:1;
      font-family:var(--hagrid);font-size:.95rem;font-weight:400;
      color:var(--cream);text-align:center;transition:color .2s;
    }
    .link-btn:hover .link-label{color:var(--yellow);}

    .link-arrow{
      font-family:var(--aileron);font-size:.75rem;color:var(--muted);
      transition:transform .2s,color .2s;margin-left:.5rem;
    }
    .link-btn:hover .link-arrow{transform:translateX(3px);color:var(--yellow);}

    .divider{
      width:100%;height:0.5px;background:var(--yellow-border);
      margin:1.5rem 0 0;
      opacity:0;animation:fadeUp .5s ease .9s forwards;
    }

    .domain{
      margin-top:1.25rem;
      font-family:var(--aileron);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;
      color:var(--muted);
      display:flex;align-items:center;gap:.5rem;
      opacity:0;animation:fadeUp .5s ease 1.05s forwards;
    }
    .domain::before,.domain::after{content:'';display:block;width:14px;height:0.5px;background:var(--muted);}

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.55);}}
    .pulse-dot{display:inline-block;width:5px;height:5px;background:var(--yellow);border-radius:50%;animation:pulse 2s ease infinite;}
  </style>
</head>
<body>

<div class="glow" id="glow"></div>

<div class="wrap">

  <div class="logo-wrap">
    <div class="logo">
      <span class="logo-lex">Lex</span>
      <span class="logo-growth">Growth</span>
    </div>
  </div>

  <p class="tagline"><span class="pulse-dot"></span>60 days to change your business.</p>
  <p class="handle">@lexgrowth_</p>

  <div class="socials">
    <a class="soc-icon" href="https://www.instagram.com/lexgrowth_/" target="_blank" title="Instagram">
      <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".9" fill="var(--cream)" stroke="none"/></svg>
    </a>
    <a class="soc-icon" href="https://wa.me/" target="_blank" title="WhatsApp">
      <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
    </a>
    <a class="soc-icon" href="https://www.youtube.com/@lexgrowth" target="_blank" title="YouTube">
      <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="var(--black)" stroke="none"/></svg>
    </a>
  </div>

  <div class="links" id="links">

    <a class="link-btn featured" href="https://wa.me/" target="_blank">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
      </div>
      <span class="link-label">WhatsApp</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://www.instagram.com/lexgrowth_/" target="_blank">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r=".9" fill="var(--yellow)" stroke="none"/></svg>
      </div>
      <span class="link-label">Instagram</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="#" target="_blank">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <span class="link-label">Lex Growth — Web</span>
      <span class="link-arrow">→</span>
    </a>

    <a class="link-btn" href="https://www.youtube.com/@lexgrowth" target="_blank">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z" stroke="var(--yellow)"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="var(--yellow)" stroke="none"/></svg>
      </div>
      <span class="link-label">YouTube</span>
      <span class="link-arrow">→</span>
    </a>

  </div>

  <div class="divider"></div>
  <p class="domain">lexgrowth.com</p>

</div>

<script>
const glow = document.getElementById('glow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';
});

document.querySelectorAll('.link-btn').forEach((btn, i) => {
  setTimeout(() => btn.classList.add('visible'), 380 + i * 110);
});
</script>

</body>
</html>
